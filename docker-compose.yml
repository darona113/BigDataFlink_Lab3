version: '3.9'

services:
  postgres:
    image: postgres:15
    container_name: bdf_postgres
    environment:
      POSTGRES_DB: labdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d labdb"]
      interval: 10s
      timeout: 5s
      retries: 10

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.3
    container_name: bdf_zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.5.3
    container_name: bdf_kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 12

  jobmanager:
    build:
      context: ./flink
    container_name: bdf_jobmanager
    hostname: jobmanager
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    command: jobmanager
    ports:
      - "8081:8081"
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: jobmanager
        parallelism.default: 1
    volumes:
      - ./flink/jobs:/opt/flink/jobs

  taskmanager:
    build:
      context: ./flink
    container_name: bdf_taskmanager
    depends_on:
      - jobmanager
    command: taskmanager
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: jobmanager
        taskmanager.numberOfTaskSlots: 4
        parallelism.default: 1
    volumes:
      - ./flink/jobs:/opt/flink/jobs

  flink-submit:
    build:
      context: ./flink
    container_name: bdf_flink_submit
    depends_on:
      - jobmanager
      - taskmanager
      - postgres
      - kafka
    volumes:
      - ./flink/jobs:/opt/flink/jobs
    entrypoint: ["/bin/bash", "-lc"]
    command: >
      "until curl -sf http://jobmanager:8081/overview >/dev/null; do echo 'Waiting for Flink JobManager...'; sleep 5; done;
       flink run -py /opt/flink/jobs/stream_to_star.py"

  producer:
    build:
      context: ./kafka-producer
    container_name: bdf_producer
    depends_on:
      kafka:
        condition: service_healthy
    volumes:
      - ./data:/app/data
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_TOPIC: sales_json
      DATA_DIR: /app/data
      SEND_DELAY_SECONDS: 0.01
    restart: "no"

volumes:
  postgres_data:
